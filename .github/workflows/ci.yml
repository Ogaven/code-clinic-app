name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Type checking ────────────────────��────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter database exec prisma generate

      - name: Type check API
        run: pnpm --filter api exec tsc --noEmit

  # ── Unit tests ────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:       postgresql://postgres:testpass@localhost:5432/codeclinic_test
      JWT_SECRET:         test-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters
      JWT_EXPIRES_IN:     15m
      NODE_ENV:           test
      APP_URL:            http://localhost:3000

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB:       codeclinic_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter database exec prisma generate

      - name: Enable pgvector extension
        run: psql postgresql://postgres:testpass@localhost:5432/codeclinic_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Push schema to test DB
        run: pnpm --filter database exec prisma db push --skip-generate

      - name: Run unit tests
        run: pnpm --filter api exec vitest run --reporter=verbose

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── Build ─────────────────────────────��───────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter database exec prisma generate

      - name: Build API
        run: pnpm --filter api build

      - name: Build Web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: https://api-production-4c43.up.railway.app
